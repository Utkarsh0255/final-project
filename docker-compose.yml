services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: ./worker
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
    deploy:
      replicas: 3

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
